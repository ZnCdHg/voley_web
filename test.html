<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Tests — Marcador Voley</title>
  <style>
    body { font-family: monospace; background: #12181f; color: #e8edf2; padding: 20px; }
    .ok { color: #4caf50; }
    .fallo { color: #e5534b; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tests de la lógica del marcador</h1>
  <pre id="salida"></pre>

  <!-- Solo cargamos la lógica: como partido.js no toca el HTML,
       se puede probar sin ninguna pantalla. -->
  <script src="partido.js"></script>
  <script>
    const salida = document.querySelector('#salida');
    let fallos = 0;

    function assert(cond, msg) {
      const linea = document.createElement('div');
      linea.textContent = (cond ? 'OK    ' : 'FALLO ') + msg;
      linea.className = cond ? 'ok' : 'fallo';
      salida.appendChild(linea);
      if (!cond) fallos++;
    }

    // ---------- PLAYA: cambio de campo cada 7 ----------
    let p = nuevoPartido('playa', 'A', 'B');
    for (let i = 0; i < 4; i++) sumarPunto(p, 0);
    for (let i = 0; i < 3; i++) sumarPunto(p, 1);   // 4-3, suma 7
    assert(p.ladosInvertidos === true, 'playa: cambio de campo a los 7 puntos');

    restarPunto(p, 1);                               // suma 6
    assert(p.ladosInvertidos === false, 'playa: restar el punto 7 deshace el cambio');

    sumarPunto(p, 1);                                // suma 7 otra vez
    assert(p.ladosInvertidos === true, 'playa: re-sumar vuelve a cambiar (sin duplicar)');

    // ---------- PLAYA: cierre de set y regla del +2 ----------
    for (let i = 0; i < 17; i++) sumarPunto(p, 0);   // A llega a 21; B se quedó en 3
    assert(p.sets[0] === 1 && p.puntos[0] === 0, 'playa: set cerrado, puntos a 0');
    assert(p.setsCerrados[0] === '21-3', 'playa: resultado guardado 21-3');
    assert(p.eventosPorSet.length === 1 && p.eventosPorSet[0].length === 24, 'playa: eventos del set archivados (24 puntos)');
    assert(p.eventosSetActual.length === 0, 'playa: eventos del set nuevo vacíos');

    p.puntos = [20, 20];
    sumarPunto(p, 0);                                // 21-20
    assert(p.sets[0] === 1, 'playa: 21-20 NO cierra el set (falta +2)');
    sumarPunto(p, 0);                                // 22-20
    assert(p.terminado === true, 'playa: 22-20 cierra set y partido (2-0)');
    assert(p.finMs !== null, 'partido terminado: hora de fin apuntada');

    // ---------- PLAYA: set decisivo a 15, cambio cada 5 ----------
    p = nuevoPartido('playa', 'A', 'B');
    p.sets = [1, 1];
    assert(puntosObjetivo(p) === 15, 'playa: decisivo a 15');
    for (let i = 0; i < 5; i++) sumarPunto(p, 0);
    assert(p.ladosInvertidos === true, 'playa decisivo: cambio a los 5');

    // ---------- 6v6: decisivo con cambio único a los 8 ----------
    p = nuevoPartido('6v6', 'A', 'B');
    p.sets = [2, 2];
    assert(puntosObjetivo(p) === 15, '6v6: 5º set a 15');
    for (let i = 0; i < 4; i++) { sumarPunto(p, 0); sumarPunto(p, 1); }  // 4-4, suma 8
    assert(p.ladosInvertidos === true, '6v6 decisivo: cambio único a los 8');
    sumarPunto(p, 0); sumarPunto(p, 1);              // suma 10
    assert(p.ladosInvertidos === true, '6v6 decisivo: NO hay segundo cambio');

    restarPunto(p, 0); restarPunto(p, 1);            // suma 8: el cambio sigue siendo válido
    assert(p.ladosInvertidos === true, '6v6 decisivo: en suma 8 el cambio se mantiene');
    restarPunto(p, 0);                               // suma 7: se quita el punto que causó el cambio
    assert(p.ladosInvertidos === false, '6v6 decisivo: bajar de 8 deshace el cambio');
    assert(p.yaHuboCambioDecisivo === false, '6v6 decisivo: se puede volver a cambiar luego');

    // ---------- 6v6: set normal sin cambios, partido a 3 sets ----------
    p = nuevoPartido('6v6', 'A', 'B');
    for (let i = 0; i < 10; i++) sumarPunto(p, 0);
    assert(p.ladosInvertidos === false, '6v6 set normal: nunca cambia de campo');

    p = nuevoPartido('6v6', 'A', 'B');
    for (let s = 0; s < 3; s++) for (let i = 0; i < 25; i++) sumarPunto(p, 0);
    assert(p.terminado && p.sets[0] === 3, '6v6: 3 sets a 25 ganan el partido');
    assert(p.eventosPorSet.length === 3, '6v6: 3 sets de eventos archivados');

    // ---------- 4v4: mejor de 3, decisivo a 15 ----------
    p = nuevoPartido('4v4', 'A', 'B');
    p.sets = [1, 1];
    assert(puntosObjetivo(p) === 15, '4v4: 3er set a 15');

    // ---------- EVENTOS y −1 ----------
    p = nuevoPartido('4v4', 'A', 'B');
    sumarPunto(p, 0); sumarPunto(p, 1); sumarPunto(p, 0);   // eventos: [0,1,0]
    restarPunto(p, 0);                                       // quita el ÚLTIMO 0
    assert(p.eventosSetActual.join(',') === '0,1', 'restar quita el último punto de ese equipo');
    assert(p.puntos[0] === 1 && p.puntos[1] === 1, 'restar deja el tanteo 1-1');

    // ---------- RACHAS ----------
    p = nuevoPartido('4v4', 'A', 'B');
    sumarPunto(p, 0); sumarPunto(p, 0); sumarPunto(p, 0);   // racha de 3 de A
    assert(p.rachaActual[0] === 3 && p.rachaMax[0] === 3, 'racha: 3 seguidos de A');
    sumarPunto(p, 1);                                        // B corta la racha
    assert(p.rachaActual[0] === 0 && p.rachaActual[1] === 1, 'racha: B corta la racha de A');
    assert(p.rachaMax[0] === 3, 'racha: la máxima de A se conserva');
    restarPunto(p, 1);                                       // se quita el punto de B
    assert(p.rachaActual[0] === 3, 'racha: al restar se resincroniza la racha en curso');
    assert(p.rachaMax[0] === 3, 'racha: la máxima no baja al restar');

    // ---------- TIEMPOS MUERTOS ----------
    p = nuevoPartido('6v6', 'A', 'B');
    assert(usarTiempoMuerto(p, 0) === true, 'TM: el primero se concede');
    assert(usarTiempoMuerto(p, 0) === true, 'TM: el segundo se concede');
    assert(usarTiempoMuerto(p, 0) === false, 'TM: el tercero se deniega');
    assert(p.tmRestantes[1] === 2, 'TM: los del rival no se tocan');
    for (let i = 0; i < 25; i++) sumarPunto(p, 0);           // se cierra el set
    assert(p.tmRestantes[0] === 2, 'TM: se reponen al empezar el set siguiente');

    // ---------- ESTADÍSTICAS ----------
    p = nuevoPartido('playa', 'A', 'B');
    for (let s = 0; s < 2; s++) {
      for (let i = 0; i < 21; i++) sumarPunto(p, 0);
      for (let i = 0; i < 5 && !p.terminado; i++) sumarPunto(p, 1);
    }
    // set 1: 21-? / la lógica exacta da igual: comprobamos la suma
    const t = puntosTotales(p);
    const eventosTotales = p.eventosPorSet.flat().length + p.eventosSetActual.length;
    assert(t[0] + t[1] === eventosTotales, 'stats: puntos totales = nº de eventos');
    assert(typeof duracionTexto(p) === 'string' && duracionTexto(p).length > 0, 'stats: duración legible');
    assert(textoCompartir(p).indexOf('Mayor racha') !== -1, 'stats: el texto de compartir incluye las rachas');

    // ---------- Casos límite ----------
    p = nuevoPartido('4v4', 'A', 'B');
    restarPunto(p, 0);
    assert(p.puntos[0] === 0, 'restar con 0 puntos no hace nada');

    p = nuevoPartido('4v4', 'A', 'B');
    p.terminado = true;
    sumarPunto(p, 0);
    assert(p.puntos[0] === 0, 'partido terminado: sumar no hace nada');
    assert(usarTiempoMuerto(p, 0) === false, 'partido terminado: no hay TM');

    const resumen = document.createElement('h2');
    resumen.id = 'resultado-final';
    resumen.textContent = fallos === 0 ? 'TODO OK' : fallos + ' FALLOS';
    resumen.className = fallos === 0 ? 'ok' : 'fallo';
    salida.appendChild(resumen);
  </script>
</body>
</html>
